<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Employment Registration</title>
	<link rel="stylesheet" href="style/Marriage_Notary_page.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
	<header class="page-header">
		<div class="header-content">
			<button class="sidebar-toggle" id="sidebarToggle" aria-label="Open Menu">
				<i class="fas fa-bars"></i>
			</button>
			<div class="header-text">
				<h1>Digital ID Portal</h1>
				<p class="subtitle">Employment Registration System</p>
			</div>
		</div>
	</header>

	<div class="main-layout">
		<!-- Sidebar -->
		<aside class="sidebar" id="sidebar">
			<div class="sidebar-header">
				<span class="sidebar-title"><i class="fas fa-scale-balanced"></i> Notary Panel</span>
			</div>
			<nav class="sidebar-nav">
				<ul>
					<!-- Recent Logs -->
					<li class="sidebar-item">
						<a href="#" class="sidebar-link" id="logsLink">
							<i class="fa-regular fa-clock"></i>
							<span>Recent Logs</span>
						</a>
						<div class="sidebar-logs" id="sidebarLogs">
							<div class="log-entry"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
						</div>
					</li>

					<!-- My Contracts -->
					<li class="sidebar-item">
						<a href="#" class="sidebar-link" id="contractsLink">
							<i class="fa-regular fa-file-lines"></i>
							<span>My Contracts</span>
							<span class="count-badge" id="contractCount">0</span>
						</a>

						<div class="sidebar-contracts" id="sidebarContracts">

							<!-- Search -->
							<div class="contracts-search">
								<input type="text" id="contractSearch" placeholder="Search name or ID...">
								<button id="contractClear" title="Reset all filters">
									<i class="fa-solid fa-arrows-rotate"></i>
								</button>
							</div>


							<!--Date range filter-->
							<div class="filter-row date-range">
								<div class="date-field">
									<label class="date-label">From</label>
									<input type="date" id="filterDateFrom" class="filter-date">
								</div>
								<div class="date-field">
									<label class="date-label">To</label>
									<input type="date" id="filterDateTo" class="filter-date">
								</div>
							</div>

							<!-- Results -->
							<ul class="contracts-list" id="contractsList">
								<li class="contract-item">
									<i class="fa-solid fa-spinner fa-spin"></i> Loading...
								</li>
							</ul>
						</div>
					</li>
				</ul>
			</nav>
		</aside>

		<!-- Main Content -->
		<main class="main-content">

			<!-- employment; Tab -->
			<div id="criminal_records" class="tab-content">
				<div class="form-header">
					<h2>employment Registration</h2>
					<p class="section-desc">Register a new employment; contract. Please fill all fields accurately and confirm all information before submission.</p>
				</div>
				<form id="employmentForm" autocomplete="off">
					<fieldset class="form-section">
						<label class="form-field">
							<span class="field-label">The violator ID</span>
							<input type="number" name="personId" required placeholder="Enter violator's national ID">
							<small class="helper-text">National ID number</small>
						</label>
                        <label class="form-field">
							<span class="field-label">The company Id </span>
							<input type="number" name="companyId" required placeholder="Enter companyId">
							<small class="helper-text">Enter The  company Id</small>
						</label>
                        <label class="form-field">
							<span class="field-label">The  manager Id </span>
							<input type="number" name="managerId" required placeholder="Enter managerId">
							<small class="helper-text">Enter The  manager Id</small>
						</label>
                        <label class="form-field">
							<span class="field-label">The  job Title </span>
							<input type="number" name="jobTitle" required placeholder="Enter job Title">
							<small class="helper-text">Enter The  job Title</small>
						</label>
                        <label class="form-field">
							<span class="field-label">The  department</span>
							<input type="text" name="department" required placeholder="Enter department">
							<small class="helper-text">Enter The  department</small>
						</label>
                        <label class="form-field">
							<span class="field-label">The  employment Type </span>
							<input type="text" name="employmentType" required placeholder="Enter employmentType">
							<small class="helper-text">Enter The  employment Type</small>
						</label
					</fieldset>
					<fieldset class="form-section">
						<label class="form-field">
							<span class="field-label">salary</span>
							<input type="number" name="salary" required placeholder="Enter salary in DZD">
							<small class="helper-text">Enter The salary </small>
						</label>
                        <label class="form-field">
							<span class="field-label">start Date</span>
							<input type="date" name="startDate" required>
							<small class="helper-text">Date of start Date ceremony</small>
						</label>
						<label class="form-field">
							<span class="field-label"> end Date</span>
							<input type="date"  name="end Date" required placeholder="end Date">
							<small class="helper-text">Date of end Date ceremony</small>
						</label>
					</fieldset>
					<fieldset class="form-section">
						<label class="form-field">
							<span class="field-label">work Location</span>
							<input type="text" name="workLocation" required placeholder="sworkLocation">
							<small class="helper-text">Enter workLocation</small>
						</label>

					</fieldset>
					<button type="submit" class="submit-btn">
						<i class="fas fa-check-circle"></i> Register Marriage
					</button>
				</form>
				<div id="employmentResult" class="result-container"></div>
			</div>
		</main>
	</div>

	<script type="module" src="employment.js"></script>
</body>
</html>
